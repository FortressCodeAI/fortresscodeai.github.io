<!DOCTYPE html>

<html lang=”en”>

<head>

  <meta charset=”UTF-8” />

  <title>Purchase GIU Packs</title>



  <style>

    Body {

      Margin: 0;

      Padding: 0;

      Background: #0d1117;

      Color: #e6edf3;

      Font-family: -apple-system, BlinkMacSystemFont, “Segoe UI”, Roboto, Oxygen,

        Ubuntu, Cantarell, “Open Sans”, “Helvetica Neue”, sans-serif;

    }



    Header {

      Padding: 32px;

      Text-align: center;

      Background: #161b22;

      Border-bottom: 1px solid #30363d;

    }



    H1 {

      Margin: 0;

      Font-size: 42px;

      Font-weight: 700;

      Letter-spacing: -1px;

    }



    .container {

      Max-width: 1100px;

      Margin: 40px auto;

      Padding: 0 20px;

      Display: grid;

      Grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));

      Gap: 32px;

    }



    .pack {

      Background: #161b22;

      Border: 1px solid #30363d;

      Border-radius: 16px;

      Padding: 24px;

      Transition: transform 0.2s ease, box-shadow 0.2s ease;

    }



    .pack:hover {

      Transform: translateY(-4px);

      Box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);

    }



    .pack h2 {

      Margin-top: 0;

      Font-size: 24px;

      Font-weight: 600;

    }



    .price {

      Font-size: 20px;

      Margin-bottom: 20px;

      Color: #58a6ff;

      Font-weight: 600;

    }



    .btn {

      Width: 100%;

      Padding: 12px 16px;

      Border-radius: 10px;

      Font-size: 16px;

      Cursor: pointer;

      Border: none;

      Margin-bottom: 10px;

    }



    .paypal {

      Background: #0070ba;

      Color: white;

    }



    .paypal:hover {

      Background: #005c97;

    }



    .etransfer {

      Background: transparent;

      Color: #58a6ff;

      Text-decoration: underline;

    }



    .etransfer:hover {

      Color: #79c0ff;

    }



    Footer {

      Text-align: center;

      Padding: 40px;

      Color: #8b949e;

      Font-size: 14px;

    }

  </style>

</head>



<body>



  <header>

    <h1>Purchase GIU Packs</h1>

  </header>



  <div class=”container”>



    <!—1,000 GIUs 

    <div class=”pack”>

      <h2>1,000 GIUs</h2>

      <div class=”price”>$10 CAD</div>



      <form action=https://www.paypal.com/cgi-bin/webscr method=”post” target=”_blank”>

        <input type=”hidden” name=”cmd” value=”_xclick”>

        <input type=”hidden” name=”business” value=fortresscodeai@outlook.com>

        <input type=”hidden” name=”item_name” value=”1,000 GIUs”>

        <input type=”hidden” name=”amount” value=”10.00”>

        <input type=”hidden” name=”currency_code” value=”CAD”>

        <button class=”btn paypal”>Pay with PayPal</button>

      </form>



      <button class=”btn etransfer” onclick=”etransfer(10)”>Pay by e‑Transfer</button>

    </div>



    <!—10,000 GIUs 

    <div class=”pack”>

      <h2>10,000 GIUs</h2>

      <div class=”price”>$100 CAD</div>



      <form action=https://www.paypal.com/cgi-bin/webscr method=”post” target=”_blank”>

        <input type=”hidden” name=”cmd” value=”_xclick”>

        <input type=”hidden” name=”business” value=fortresscodeai@outlook.com>

        <input type=”hidden” name=”item_name” value=”10,000 GIUs”>

        <input type=”hidden” name=”amount” value=”100.00”>

        <input type=”hidden” name=”currency_code” value=”CAD”>

        <button class=”btn paypal”>Pay with PayPal</button>

      </form>



      <button class=”btn etransfer” onclick=”etransfer(100)”>Pay by e‑Transfer</button>

    </div>



    <!—50,000 GIUs 

    <div class=”pack”>

      <h2>50,000 GIUs</h2>

      <div class=”price”>$500 CAD</div>



      <form action=https://www.paypal.com/cgi-bin/webscr method=”post” target=”_blank”>

        <input type=”hidden” name=”cmd” value=”_xclick”>

        <input type=”hidden” name=”business” value=fortresscodeai@outlook.com>

        <input type=”hidden” name=”item_name” value=”50,000 GIUs”>

        <input type=”hidden” name=”amount” value=”500.00”>

        <input type=”hidden” name=”currency_code” value=”CAD”>

        <button class=”btn paypal”>Pay with PayPal</button>

      </form>



      <button class=”btn etransfer” onclick=”etransfer(500)”>Pay by e‑Transfer</button>

    </div>



    <!—100,000 GIUs 

    <div class=”pack”>

      <h2>100,000 GIUs</h2>

      <div class=”price”>$1,000 CAD</div>



      <form action=https://www.paypal.com/cgi-bin/webscr method=”post” target=”_blank”>

        <input type=”hidden” name=”cmd” value=”_xclick”>

        <input type=”hidden” name=”business” value=fortresscodeai@outlook.com>

        <input type=”hidden” name=”item_name” value=”100,000 GIUs”>

        <input type=”hidden” name=”amount” value=”1000.00”>

        <input type=”hidden” name=”currency_code” value=”CAD”>

        <button class=”btn paypal”>Pay with PayPal</button>

      </form>



      <button class=”btn etransfer” onclick=”etransfer(1000)”>Pay by e‑Transfer</button>

    </div>



  </div>



  <footer>

    FortressCodeAI — GIU Purchase Portal

  </footer>



  <script>

    Function etransfer(amount) {

      Alert(

        `Send $${amount} CAD by e‑Transfer to:\n\n` +

        `fortresscodeai@outlook.com\n\n` +

        `Include your email in the message. GIUs will be credited after confirmation.`

      );

    }

  </script>



</body>

</html>
