<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FortressCode Builder Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <h2 class="logo">FortressCode</h2>
      <nav>
        <button class="nav-item" data-view="dashboard">Dashboard</button>
        <button class="nav-item" data-view="modules">Modules</button>
        <button class="nav-item" data-view="envelope">Governance Envelope</button>
        <button class="nav-item" data-view="hitl">HITL Approvals</button>
        <button class="nav-item" data-view="marketplace">Marketplace</button>
        <button class="nav-item" data-view="logs">Substrate Logs</button>
        <button class="nav-item" data-view="settings">Settings</button>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="status">
          <span id="system-status" class="status-dot green"></span>
          <span>Connected</span>
        </div>
        <div class="user-info">
          <span id="user-name">Loading...</span>
          <span id="authority-level" class="badge">Authority: Unknown</span>
        </div>
      </header>

      <section id="content-area"></section>

      <footer class="console">
        <h3>Event Stream</h3>
        <div id="event-log"></div>
      </footer>
    </main>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
